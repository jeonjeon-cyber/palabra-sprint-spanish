      <stop stop-color="#FFF5D9"/>
      <stop offset="1" stop-color="#FFFDF7"/>
    </linearGradient>
    <linearGradient id="card" x1="208" y1="156" x2="964" y2="502" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
